<div class="header">
  <div class="header__title">{{ documentName() }}</div>
  <div class="header__actions">
    <div class="zoom-info">{{ zoomImageService.zoom() | percentage }}</div>
    <button (click)="zoomImageService.zoomIn()">+</button>
    <button (click)="zoomImageService.zoomOut()">-</button>
    <button (click)="viewResult()">Save</button>

  </div>
</div>

<div class="container">
  @for (page of pageList(); track page.number) {
  <app-document-page [page]="page" />
  }
</div>
